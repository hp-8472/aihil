name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.14.0"
          cache: npm

      - name: Use npm 11.5.1
        run: npm install -g npm@11.5.1

      - name: Validate release tag
        run: node scripts/validate-release.mjs "$GITHUB_REF_NAME"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check shrinkwrap alignment
        run: npm run shrinkwrap:check

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Check package contents
        run: npm run pack:check

      - name: Pack npm artifact
        run: npm pack

      - name: Generate SBOM
        run: npm run sbom

      - name: Attest npm tarball
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: "${{ github.workspace }}/*.tgz"

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: "${{ github.workspace }}/*.tgz"
          sbom-path: "${{ github.workspace }}/sbom.cdx.json"

      - name: Create release with notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes

      - name: Upload npm tarball and SBOM
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" ./*.tgz sbom.cdx.json --repo "$GITHUB_REPOSITORY" --clobber
