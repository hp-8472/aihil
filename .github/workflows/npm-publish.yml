name: Publish npm package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.1
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: https://registry.npmjs.org

      - name: Use npm 11.5.1 or newer
        run: npm install -g npm@^11.5.1

      - name: Show publishing toolchain
        run: |
          node --version
          npm --version

      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: >-
          node -e "const tag=process.env.RELEASE_TAG; const pkg=require('./package.json'); const lock=require('./package-lock.json'); const strict=/^v(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-[0-9A-Za-z-]+(?:\\.[0-9A-Za-z-]+)*)?(?:\\+[0-9A-Za-z-]+(?:\\.[0-9A-Za-z-]+)*)?$/; if(!strict.test(tag)){throw new Error('Release tag must be strict SemVer prefixed with v, got '+tag)} if(tag !== 'v'+pkg.version){throw new Error('Release tag '+tag+' does not match package.json version '+pkg.version)} if(lock.version !== pkg.version || lock.packages?.['']?.version !== pkg.version){throw new Error('package-lock.json version does not match package.json version '+pkg.version)}"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check package contents
        run: npm run pack:check

      - name: Ensure version is not already published
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "aihil@$VERSION" version >/dev/null 2>&1; then
            echo "aihil@$VERSION is already published. Bump package.json before publishing."
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --provenance --access public
