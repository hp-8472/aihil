name: Node CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check shrinkwrap alignment
        run: npm run shrinkwrap:check

      - name: Audit production dependencies
        run: npm run audit:prod

  test:
    name: Node ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - "16.16.0"
          - "22.x"
          - "24.x"
          - "lts/*"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check shrinkwrap alignment
        run: npm run shrinkwrap:check

      - name: Check package contents
        run: npm run pack:check

  required-ci:
    name: Required CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - audit
      - test
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          if [[ "${{ needs.audit.result }}" != "success" ]]; then
            echo "Production dependency audit finished with ${{ needs.audit.result }}"
            exit 1
          fi

          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Node test matrix finished with ${{ needs.test.result }}"
            exit 1
          fi
